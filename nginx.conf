server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Kubernetes liveness/readiness probe target.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Assets use stable filenames (not content-hashed) and the app is tiny, so
    # let browsers cache but always revalidate via ETag — a fresh deploy is
    # picked up immediately instead of serving a stale (broken) page for an hour.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
