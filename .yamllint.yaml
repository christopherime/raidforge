extends: default

# Helm templates use {{ }} Go template syntax which yamllint cannot parse.
# helm lint covers those files; exclude them here.
ignore: |
  chart/templates/

rules:
  line-length:
    max: 120
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: true
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
